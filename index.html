<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>書き取りツール</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>書き取りツール</h1>
      <p>音声を聴きながらタイピング練習ができるツールです。</p>
    </header>

    <main>
      <section class="setup-section" aria-labelledby="setup-title">
        <h2 id="setup-title" class="visually-hidden">音声設定</h2>
        <div class="field">
          <label for="audioFile">音声ファイルを選択してください</label>
          <input type="file" id="audioFile" accept="audio/*" aria-describedby="audio-help audio-error">
          <p id="audio-help" class="visually-hidden">ファイルを選択すると、自動的にプレイヤーに読み込まれます。</p>
          <p id="audio-error" role="alert" hidden></p>
        </div>
      </section>

      <section class="player-section" aria-label="再生コントロール">
        <audio id="player" controls aria-label="音声再生"></audio>
        <div id="status-region" class="visually-hidden" aria-live="polite"></div>
      </section>

      <section class="editor-section" aria-labelledby="editor-title">
        <h2 id="editor-title" class="visually-hidden">入力エリア</h2>
        <label for="editor">書き取りテキストを入力してください</label>
        <textarea
          id="editor"
          placeholder="Ctrl + Enter で再生・一時停止"
          aria-multiline="true"
          aria-keyshortcuts="Control+Enter Control+ArrowLeft Control+ArrowRight Control+S"
          spellcheck="false"
        ></textarea>
        <p id="download-status" hidden></p>
      </section>
    </main>

    <footer>
      <section aria-labelledby="shortcut-title">
        <h2 id="shortcut-title">操作案内（キーボードショートカット）</h2>
        <ul>
          <li><kbd data-mod>Ctrl</kbd> + <kbd data-key="playPause">Enter</kbd>: 再生 / 一時停止</li>
          <li><kbd data-mod>Ctrl</kbd> + <kbd data-key="seekBack">←</kbd>: <span data-seek="back">10</span>秒戻る</li>
          <li><kbd data-mod>Ctrl</kbd> + <kbd data-key="seekForward">→</kbd>: <span data-seek="forward">10</span>秒進む</li>
          <li><kbd data-mod>Ctrl</kbd> + <kbd data-key="download">S</kbd>: 保存</li>
        </ul>
      </section>
    </footer>

    <div id="settings-modal" hidden>
      <h2>設定</h2>

      <section>
        <h3>ショートカット</h3>
        <ul>
          <li>
            <span>再生 / 一時停止</span>
            <button data-capture="playPause">Enter</button>
            <label><input type="checkbox" data-modifier="playPause"> 修飾キー</label>
            <span data-capture-error="playPause" hidden></span>
          </li>
          <li>
            <span>戻る</span>
            <button data-capture="seekBack">←</button>
            <label><input type="checkbox" data-modifier="seekBack"> 修飾キー</label>
            <span data-capture-error="seekBack" hidden></span>
          </li>
          <li>
            <span>進む</span>
            <button data-capture="seekForward">→</button>
            <label><input type="checkbox" data-modifier="seekForward"> 修飾キー</label>
            <span data-capture-error="seekForward" hidden></span>
          </li>
          <li>
            <span>保存</span>
            <button data-capture="download">s</button>
            <label><input type="checkbox" data-modifier="download"> 修飾キー</label>
            <span data-capture-error="download" hidden></span>
          </li>
        </ul>
      </section>

      <section>
        <h3>シーク秒数</h3>
        <label>戻る（秒）<input type="number" id="seekBackSeconds" min="1" max="60"></label>
        <label>進む（秒）<input type="number" id="seekForwardSeconds" min="1" max="60"></label>
      </section>

      <div>
        <button id="saveSettings">保存</button>
        <button id="exportSettings">書き出し</button>
        <label>読み込み<input type="file" id="importSettingsFile" accept=".json"></label>
        <button id="resetSettings">リセット</button>
        <p id="settings-error" hidden></p>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
