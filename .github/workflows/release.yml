name: Release

# v* タグ（例: v1.0.0）を push したときに自動でリリースを作成する。
# テストが失敗した場合はリリースを中断する。

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # GitHub Release の作成とアセットのアップロードに必要
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'  # node_modules を npm ci のたびに再インストールしないためのキャッシュ
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          # Playwright バージョンが変わったとき（package-lock.json の変化で検出）だけキャッシュを更新する
          # キー名に chromium-firefox を含めてブラウザ構成の変化を反映する
          key: playwright-chromium-firefox-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install chromium firefox --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'  # キャッシュヒット時はスキップ
      - run: npm test  # テスト失敗時はここで中断されリリースされない
      - run: npm run build
      - name: ZIP the dist
        run: |
          cd dist
          # dist/ の中身をすべて ZIP 化する。
          # 解凍後に index.html をダブルクリックするだけで起動できる構成にする。
          zip -r ../dictation-checker-${{ github.ref_name }}.zip .
      - uses: softprops/action-gh-release@v2
        with:
          files: dictation-checker-${{ github.ref_name }}.zip
